zabbix_export:
  version: '7.4'
  template_groups:
    -
      uuid: ae04fa2c061b4694ab3b602fbe358133
      name: 'Templates/Applications'
  templates:
    -
      uuid: 5c152a86a0724f619c54d2e9dc7dd0ad
      template: 'postfix_smtp_server'
      name: 'Postfix SMTP Server by Zabbix Agent2 (active)'
      description: |
        This template is designed to monitor Postfix SMTP servers. It provides key metrics such as service availability, response time, and error rates to ensure the mail server is functioning properly. By using this template, administrators can proactively identify and resolve issues with their Postfix SMTP server infrastructure.
      readme: |
        # Postfix SMTP Server Template

        This template is designed to monitor Postfix SMTP servers. It provides key metrics such as service availability, response time, and error rates to ensure the mail server is functioning properly. By using this template, administrators can proactively identify and resolve issues with their Postfix SMTP server infrastructure.

        ## Key Features

        - **Service Availability**: Monitor whether the Postfix SMTP service is running and accessible.
        - **Response Time**: Track the response time of the SMTP server to ensure it is performing optimally.
        - **Error Rates**: Monitor the number of errors occurring in the SMTP server to identify potential issues.

        ## Usage

        To use this template, simply import it into your Zabbix instance and link it to the hosts that are running Postfix SMTP servers. The template will automatically start collecting data and provide insights into the performance and health of your mail server infrastructure.
      vendor:
        name: 'John Stray'
        version: '1.0'

      groups:
        -
          name: 'Templates/Applications'

      tags:
        -
          tag: class
          value: software
        -
          tag: target
          value: postfix

      items:

        # POSTFIX: Master Process Running
        -
          uuid: 7153fa82182f4152834dcfb8f617c85f
          name: 'Postfix: Master Process Running'
          description: 'This item checks if the Postfix master process is running. Monitoring the master process is crucial for ensuring that the Postfix SMTP server is operational and can handle incoming mail traffic.'
          type: ZABBIX_ACTIVE
          key: postfix.process.running
          delay: 1m
          history: 3d
          value_type: UNSIGNED
          tags:
            -
              tag: component
              value: service
            -
              tag: application
              value: postfix
          trends: '0'
          valuemap:
            name: 'Postfix Process Status'
          triggers:
            -
              uuid: 45827c0707f64d05a40e45c3a4dd7a32
              expression: last(/postfix_smtp_server/postfix.process.running)=0
              recovery_mode: RECOVERY_EXPRESSION
              recovery_expression: last(/postfix_smtp_server/postfix.process.running)=1
              name: 'Postfix Master Process is not running on {{HOST.NAME}}'
              priority: DISASTER
              manual_close: 'NO'

        # POSTFIX: Mail Queue Size
        -
          uuid: 8c9b1e5a0c8f4d2b9a3e5f6a7b8c9d0e
          name: 'Postfix: Mail Queue Size'
          description: 'This item monitors the size of the Postfix mail queue. A growing mail queue can indicate issues with mail delivery, such as network problems or misconfigurations. Monitoring the mail queue size helps administrators identify and resolve potential issues before they impact mail server performance.'
          type: ZABBIX_ACTIVE
          key: postfix.pfmailq
          delay: 1m
          history: 7d
          value_type: UNSIGNED
          tags:
            -
              tag: component
              value: mailqueue
            -
              tag: application
              value: postfix
          trends: 90d
          triggers:
            -
              uuid: ed2f72b564ef4e998045ab4b4e4b377f
              expression: last(/postfix_smtp_server/postfix.pfmailq,5m)>{$POSTFIX.QUEUE.WARN}
              name: 'Postfix Mail Queue Size is too high - ({ITEM.VALUE} messages) on {{HOST.NAME}}'
              description: 'This trigger fires when the mail queue size exceeds the defined warning threshold. A high mail queue size can indicate issues with mail delivery, such as network problems or misconfigurations. It is important to investigate and resolve the underlying cause to ensure smooth mail server operation.'
              priority: WARNING
              recovery_mode: RECOVERY_EXPRESSION
              recovery_expression: last(/postfix_smtp_server/postfix.pfmailq,5m)<=$POSTFIX.QUEUE.WARN
              manual_close: 'YES'
              dependencies:
                 -
                   name: 'Postfix Mail Queue Size is very high - ({ITEM.VALUE} messages) on {{HOST.NAME}}'
                   expression: last(/postfix_smtp_server/postfix.pfmailq,5m)>{$POSTFIX.QUEUE.HIGH}
            -
              uuid: fbc160dd13144b069e428580e4000b5a
              expression: last(/postfix_smtp_server/postfix.pfmailq,5m)>{$POSTFIX.QUEUE.HIGH}
              name: 'Postfix Mail Queue Size is very high - ({ITEM.VALUE} messages) on {{HOST.NAME}}'
              description: 'This trigger fires when the mail queue size exceeds the defined high threshold. A very high mail queue size can lead to significant mail delivery delays and potential loss of emails. Immediate investigation and resolution are required to prevent further issues with the mail server.'
              priority: HIGH
              recovery_mode: RECOVERY_EXPRESSION
              recovery_expression: last(/postfix_smtp_server/postfix.pfmailq,5m)<=$POSTFIX.QUEUE.HIGH
              manual_close: 'NO'
              dependencies:
                -
                  name: 'Postfix Mail Queue Size is critical - ({ITEM.VALUE} messages) on {{HOST.NAME}}'
                  expression: last(/postfix_smtp_server/postfix.pfmailq,5m)>{$POSTFIX.QUEUE.DISASTER}
            -
              uuid: 5eeb6761243749be8b887d3780cf4b06
              expression: last(/postfix_smtp_server/postfix.pfmailq,5m)>{$POSTFIX.QUEUE.DISASTER}
              name: 'Postfix Mail Queue Size is critical - ({ITEM.VALUE} messages) on {{HOST.NAME}}'
              description: 'This trigger fires when the mail queue size exceeds the defined critical threshold. A critical mail queue size can cause severe mail delivery failures and significant operational issues. Immediate action is required to address the underlying problems and restore normal mail server functionality.'
              priority: DISASTER
              recovery_mode: RECOVERY_EXPRESSION
              recovery_expression: last(/postfix_smtp_server/postfix.pfmailq,5m)<=$POSTFIX.QUEUE.DISASTER
              manual_close: 'NO'

        # POSTFIX: SMTP Connections
        -
          uuid: fd513885ee094151ba8ebcc353b52d89
          name: 'Postfix: SMTP Connections'
          description: 'This item monitors the number of active SMTP connections to the Postfix server. Monitoring SMTP connections helps administrators understand the load on the mail server and identify potential issues with mail delivery or network connectivity.'
          type: ZABBIX_ACTIVE
          key: postfix.connections
          delay: 1m
          history: 7d
          value_type: UNSIGNED
          tags:
            -
              tag: component
              value: service
            -
              tag: application
              value: postfix
          trends: 90d
          triggers:
            -
              uuid: 1c9e5b8a7f4d4e5b9a3c2d1e6f7b8c9d
              expression: last(/postfix_smtp_server/postfix.connections,5m)>{$POSTFIX.CONNECTIONS.WARN}
              name: 'Postfix SMTP Connections are high - ({ITEM.VALUE} connections) on {{HOST.NAME}}'
              description: 'This trigger fires when the number of active SMTP connections exceeds the defined warning threshold. A high number of SMTP connections can indicate increased mail traffic or potential issues with mail delivery. It is important to monitor and manage SMTP connections to ensure optimal performance of the mail server.'
              priority: WARNING
              recovery_mode: RECOVERY_EXPRESSION
              recovery_expression: last(/postfix_smtp_server/postfix.connections,5m)<=$POSTFIX.CONNECTIONS.WARN
              manual_close: 'YES'
              dependencies:
                 -
                   name: 'Postfix SMTP Connections are very high - ({ITEM.VALUE} connections) on {{HOST.NAME}}'
                   expression: last(/postfix_smtp_server/postfix.connections,5m)>{$POSTFIX.CONNECTIONS.HIGH}
            -
              uuid: 2d3f4e5b6a7c8d9e0f1a2b3c4d5e6f7g
              expression: last(/postfix_smtp_server/postfix.connections,5m)>{$POSTFIX.CONNECTIONS.HIGH}
              name: 'Postfix SMTP Connections are very high - ({ITEM.VALUE} connections) on {{HOST.NAME}}'
              description: 'This trigger fires when the number of active SMTP connections exceeds the defined high threshold. A very high number of SMTP connections can lead to performance degradation and potential mail delivery issues. Immediate investigation and resolution are required to maintain optimal mail server functionality.'
              priority: HIGH
              recovery_mode: RECOVERY_EXPRESSION
              recovery_expression: last(/postfix_smtp_server/postfix.connections,5m)<=$POSTFIX.CONNECTIONS.HIGH
              manual_close: 'NO'

        # POSTFIX: Postfix Log Data
        -
          uuid: c04ca0b89ce940ba9747b2bc7ef66c96
          name: 'Postfix: Log Data (JSON)'
          description: 'This item collects log data from the Postfix server. Analyzing log data can help administrators identify and troubleshoot issues with mail delivery, authentication, and other aspects of the mail servers operation.'
          type: ZABBIX_ACTIVE
          key: postfix.fetch_log_data
          delay: 5m
          history: 1d
          value_type: TEXT
          tags:
            -
              tag: component
              value: logs
            -
              tag: application
              value: postfix
          trends: '0'

        # POSTFIX: Queue Disk Usage %
        -
          uuid: f4c0337b5cc44d4f997a4d554b6c3e51
          name: 'Postfix: Queue Disk Usage %'
          description: 'This item monitors the percentage of disk space used by the Postfix mail queue. Monitoring disk usage is important to ensure that the mail server has sufficient resources to handle incoming and outgoing mail traffic without running into storage issues.'
          type: ZABBIX_ACTIVE
          key: postfix.queue.disk
          delay: 5m
          history: 7d
          value_type: UNSIGNED
          tags:
            -
              tag: component
              value: mailqueue
            -
              tag: application
              value: postfix
          trends: 90d
          triggers:
            -
              uuid: 9a8b7c6d5e4f3a2b1c0d9e8f7a6b5c4d
              expression: last(/postfix_smtp_server/postfix.queue.disk)>{$POSTFIX.QUEUE.DISK.WARN}
              name: 'Postfix Queue Disk Usage is high - ({ITEM.VALUE}%) on {{HOST.NAME}}'
              description: 'This trigger fires when the percentage of disk space used by the Postfix mail queue exceeds the defined warning threshold. High disk usage can lead to performance issues and potential mail delivery failures. It is important to monitor and manage disk usage to ensure optimal performance of the mail server.'
              priority: WARNING
              recovery_mode: RECOVERY_EXPRESSION
              recovery_expression: last(/postfix_smtp_server/postfix.queue.disk)<=$POSTFIX.QUEUE.DISK.WARN
              manual_close: 'YES'
              dependencies:
                 -
                   name: 'Postfix Queue Disk Usage is very high - ({ITEM.VALUE}%) on {{HOST.NAME}}'
                   expression: last(/postfix_smtp_server/postfix.queue.disk)>{$POSTFIX.QUEUE.DISK.HIGH}
            -
              uuid: 4e3f2d1c0b9a8f7e6d5c4b3a2f1e0d9c
              expression: last(/postfix_smtp_server/postfix.queue.disk)>{$POSTFIX.QUEUE.DISK.HIGH}
              name: 'Postfix Queue Disk Usage is very high - ({ITEM.VALUE}%) on {{HOST.NAME}}'
              description: 'This trigger fires when the percentage of disk space used by the Postfix mail queue exceeds the defined high threshold. Very high disk usage can lead to severe performance degradation and potential mail delivery failures. Immediate investigation and resolution are required to maintain optimal mail server functionality.'
              priority: HIGH
              recovery_mode: RECOVERY_EXPRESSION
              recovery_expression: last(/postfix_smtp_server/postfix.queue.disk)<=$POSTFIX.QUEUE.DISK.HIGH
              manual_close: 'NO'

        # POSTFIX: Postfix Version
        -
          uuid: c9ea171346334e7482de71b5bcd3a8f2
          name: 'Postfix: Version'
          description: 'This item retrieves the version of the Postfix server. Knowing the Postfix version can help administrators ensure that they are running a supported and secure version of the software, and can assist in troubleshooting and compatibility checks.'
          type: ZABBIX_ACTIVE
          key: postfix.version
          delay: 12h
          history: 30d
          value_type: CHAR
          tags:
            -
              tag: component
              value: service
            -
              tag: application
              value: postfix
          trends: '0'

        # POSTFIX: Submission (587) Reachability
        -
          uuid: 71020283e35d446d8318098668281e09
          name: 'Postfix: Submission (587) Reachability'
          description: 'This item checks the reachability of the Postfix submission service on port 587. Monitoring the submission service is important for ensuring that clients can send mail through the Postfix server, and that the server is properly configured to handle outgoing mail traffic.'
          type: ZABBIX_ACTIVE
          key: postfix.submission.check
          delay: 5m
          history: 30d
          value_type: UNSIGNED
          tags:
            -
              tag: component
              value: service
            -
              tag: application
              value: postfix
          trends: '0'
          triggers:
            -
              uuid: 27290edc65a2481ab1a30394f4271da5
              expression: last(/postfix_smtp_server/postfix.submission.check)=0
              name: 'Postfix Submission Service is not reachable on {{HOST.NAME}}'
              description: 'This trigger fires when the Postfix submission service on port 587 is not reachable. Monitoring the reachability of the submission service is crucial for ensuring that clients can send mail through the Postfix server, and that the server is properly configured to handle outgoing mail traffic. Immediate investigation and resolution are required to restore normal mail server functionality.'
              priority: HIGH
              recovery_mode: RECOVERY_EXPRESSION
              recovery_expression: last(/postfix_smtp_server/postfix.submission.check)=1
              manual_close: 'NO'

        # POSTFIX: Submissions (465) Reachability
        -
          uuid: 3a9f954cd565492eab407d2352709c2d
          name: 'Postfix: Submissions (465) Reachability'
          description: 'This item checks the reachability of the Postfix submissions service on port 465. Monitoring the submissions service is important for ensuring that clients can send mail through the Postfix server, and that the server is properly configured to handle outgoing mail traffic.'
          type: ZABBIX_ACTIVE
          key: postfix.submissions.check
          delay: 5m
          history: 30d
          value_type: UNSIGNED
          tags:
            -
              tag: component
              value: service
            -
              tag: application
              value: postfix
          trends: '0'
          triggers:
            -
              uuid: fe0ee6a7f2994ca8bbb858391c47f2cd
              expression: last(/postfix_smtp_server/postfix.submissions.check)=0
              name: 'Postfix Submissions Service is not reachable on {{HOST.NAME}}'
              description: 'This trigger fires when the Postfix submissions service on port 465 is not reachable. Monitoring the reachability of the submissions service is crucial for ensuring that clients can send mail through the Postfix server, and that the server is properly configured to handle outgoing mail traffic. Immediate investigation and resolution are required to restore normal mail server functionality.'
              priority: HIGH
              recovery_mode: RECOVERY_EXPRESSION
              recovery_expression: last(/postfix_smtp_server/postfix.submissions.check)=1
              manual_close: 'NO'

        # POSTFIX: SMTP (25) Reachability
        -
          uuid: 496c9d173d294e5ba909e22195460730
          name: 'Postfix: SMTP (25) Reachability'
          description: 'This item checks the reachability of the Postfix SMTP service on port 25. Monitoring the SMTP service is important for ensuring that the mail server can receive incoming mail traffic and that it is properly configured to handle email delivery.'
          type: ZABBIX_ACTIVE
          key: postfix.smtp.check
          delay: 5m
          history: 30d
          value_type: UNSIGNED
          tags:
            -
              tag: component
              value: service
            -
              tag: application
              value: postfix
          trends: '0'
          triggers:
            -
              uuid: ed7b497bab05413d8bb6c363e88429ce
              expression: last(/postfix_smtp_server/postfix.smtp.check)=0
              name: 'Postfix SMTP Service is not reachable on {{HOST.NAME}}'
              description: 'This trigger fires when the Postfix SMTP service on port 25 is not reachable. Monitoring the reachability of the SMTP service is crucial for ensuring that the mail server can receive incoming mail traffic and that it is properly configured to handle email delivery. Immediate investigation and resolution are required to restore normal mail server functionality.'
              priority: HIGH
              recovery_mode: RECOVERY_EXPRESSION
              recovery_expression: last(/postfix_smtp_server/postfix.smtp.check)=1
              manual_close: 'NO'

        # POSTFIX: TLS Certificate Details (465)
        -
          uuid: 0176f2d0318d4d6b8ca9edd681665eee
          name: 'Postfix: TLS Certificate Details (465)'
          description: 'This item retrieves details about the TLS certificate used by the Postfix server, such as the issuer, subject, and expiration date. Monitoring TLS certificate details is important for ensuring that secure connections can be maintained and that there are no disruptions in mail server functionality due to expired or misconfigured certificates.'
          type: ZABBIX_ACTIVE
          key: postfix.tls.cert.raw.465
          delay: 12h
          history: 30d
          value_type: CHAR
          tags:
            -
              tag: component
              value: ssl-cert
            -
              tag: application
              value: postfix
          trends: '0'

        # POSTFIX: TLS Certificate days remaining (465)
        -
          uuid: 4ced39d489c94f96a874d9f461cec82d
          name: 'Postfix: TLS Certificate Days Remaining (465)'
          description: 'This item monitors the number of days remaining before the TLS certificate used by the Postfix server expires. Monitoring TLS certificate expiration is important for ensuring that secure connections can be maintained and that there are no disruptions in mail server functionality due to expired certificates.'
          type: ZABBIX_ACTIVE
          key: postfix.tls.cert.days.465
          delay: 12h
          history: 90d
          value_type: UNSIGNED
          tags:
            -
              tag: component
              value: ssl-cert
            -
              tag: application
              value: postfix
          trends: 365d
          triggers:
            -
              uuid: 65c7dc74109a43f9972162ece56ef0e4
              expression: last(/postfix_smtp_server/postfix.tls.cert.days)<30
              name: 'Postfix 465 TLS Certificate Expiration in {ITEM.VALUE} days on {{HOST.NAME}}'
              description: 'This trigger fires when the number of days remaining before the TLS certificate used by the Postfix server expires is less than 30 days. Monitoring TLS certificate expiration is crucial for ensuring that secure connections can be maintained and that there are no disruptions in mail server functionality due to expired certificates. It is important to renew the TLS certificate before it expires to maintain optimal security and performance of the mail server.'
              priority: WARNING
              recovery_mode: RECOVERY_EXPRESSION
              recovery_expression: last(/postfix_smtp_server/postfix.tls.cert.days)>=30
              manual_close: 'YES'
              dependencies:
                -
                  name: 'Postfix 465 TLS Certificate Expiration soon in ({ITEM.VALUE} days) on {{HOST.NAME}}'
                  expression: last(/postfix_smtp_server/postfix.tls.cert.days)<14
            -
              uuid: 15ca2001be334d9fb2675e0a302a8fe2
              expression: last(/postfix_smtp_server/postfix.tls.cert.days)<14
              name: 'Postfix 465 TLS Certificate Expiration soon in ({ITEM.VALUE} days) on {{HOST.NAME}}'
              description: 'This trigger fires when the number of days remaining before the TLS certificate used by the Postfix server expires is less than 7 days. Monitoring TLS certificate expiration is crucial for ensuring that secure connections can be maintained and that there are no disruptions in mail server functionality due to expired certificates. Immediate action is required to renew the TLS certificate to prevent security issues and maintain optimal performance of the mail server.'
              priority: WARNING
              recovery_mode: RECOVERY_EXPRESSION
              recovery_expression: last(/postfix_smtp_server/postfix.tls.cert.days)>=14
              manual_close: 'YES'
              dependencies:
                -
                  name: 'Postfix 465 TLS Certificate Expiration imminent in ({ITEM.VALUE} days) on {{HOST.NAME}}'
                  expression: last(/postfix_smtp_server/postfix.tls.cert.days)<7
            -
              uuid: 7936fded59724acba877edb6e7d80aa4
              expression: last(/postfix_smtp_server/postfix.tls.cert.days)<7
              name: 'Postfix 465 TLS Certificate Expiration imminent in ({ITEM.VALUE} days) on {{HOST.NAME}}'
              description: 'This trigger fires when the number of days remaining before the TLS certificate used by the Postfix server expires is less than 7 days. Monitoring TLS certificate expiration is crucial for ensuring that secure connections can be maintained and that there are no disruptions in mail server functionality due to expired certificates. Immediate action is required to renew the TLS certificate to prevent security issues and maintain optimal performance of the mail server.'
              priority: HIGH
              recovery_mode: RECOVERY_EXPRESSION
              recovery_expression: last(/postfix_smtp_server/postfix.tls.cert.days)>=7
              manual_close: 'NO'
              dependencies:
                -
                  name: 'Postfix 465 TLS Certificate Expiration imminent in ({ITEM.VALUE} days) on {{HOST.NAME}}'
                  expression: last(/postfix_smtp_server/postfix.tls.cert.days)<1
            -
              uuid: 2ffac4485f4c40a888354f9372b9e0ec
              expression: last(/postfix_smtp_server/postfix.tls.cert.days)<1
              name: 'Postfix 465 TLS Certificate Expiration imminent in ({ITEM.VALUE} days) on {{HOST.NAME}}'
              description: 'This trigger fires when the number of days remaining before the TLS certificate used by the Postfix server expires is less than 1 day. Monitoring TLS certificate expiration is crucial for ensuring that secure connections can be maintained and that there are no disruptions in mail server functionality due to expired certificates. Immediate action is required to renew the TLS certificate to prevent security issues and maintain optimal performance of the mail server.'
              priority: HIGH
              recovery_mode: RECOVERY_EXPRESSION
              recovery_expression: last(/postfix_smtp_server/postfix.tls.cert.days)>=1
              manual_close: 'NO'
              dependencies:
                -
                  name: 'Postfix 465 TLS Certificate Expiration imminent in ({ITEM.VALUE} days) on {{HOST.NAME}}'
                  expression: last(/postfix_smtp_server/postfix.tls.cert.days)<1
            -
              uuid: f6c6686a5648469ba7b4c7ee72a957c6
              expression: last(/postfix_smtp_server/postfix.tls.cert.days)<0
              name: 'Postfix 465 TLS Certificate Expired ({ITEM.VALUE} days) on {{HOST.NAME}}'
              description: 'This trigger fires when the number of days remaining before the TLS certificate used by the Postfix server expires is less than 0 days, indicating that the certificate has expired. Monitoring TLS certificate expiration is crucial for ensuring that secure connections can be maintained and that there are no disruptions in mail server functionality due to expired certificates. Immediate action is required to renew the TLS certificate to prevent security issues and restore optimal performance of the mail server.'
              priority: DISASTER
              recovery_mode: RECOVERY_EXPRESSION
              recovery_expression: last(/postfix_smtp_server/postfix.tls.cert.days)>=0
              manual_close: 'NO'

        # POSTFIX: TLS Certificate Details (587)
        -
          uuid: 8c1974c985b0487f8c21d51f8b2e53a9
          name: 'Postfix: TLS Certificate Details (587)'
          description: 'This item retrieves details about the TLS certificate used by the Postfix server, such as the issuer, subject, and expiration date. Monitoring TLS certificate details is important for ensuring that secure connections can be maintained and that there are no disruptions in mail server functionality due to expired or misconfigured certificates.'
          type: ZABBIX_ACTIVE
          key: postfix.tls.cert.raw.587
          delay: 12h
          history: 30d
          value_type: CHAR
          tags:
            -
              tag: component
              value: ssl-cert
            -
              tag: application
              value: postfix
          trends: '0'

        # POSTFIX: TLS Certificate days remaining (587)
        -
          uuid: f98005ccfea240cb8c95842ae98f53bd
          name: 'Postfix: TLS Certificate Days Remaining (587)'
          description: 'This item monitors the number of days remaining before the TLS certificate used by the Postfix server expires. Monitoring TLS certificate expiration is important for ensuring that secure connections can be maintained and that there are no disruptions in mail server functionality due to expired certificates.'
          type: ZABBIX_ACTIVE
          key: postfix.tls.cert.days.587
          delay: 12h
          history: 90d
          value_type: UNSIGNED
          tags:
            -
              tag: component
              value: ssl-cert
            -
              tag: application
              value: postfix
          trends: 365d
          triggers:
            -
              uuid: c5e68ef314904e2489b1fedacc50fcfc
              expression: last(/postfix_smtp_server/postfix.tls.cert.days)<30
              name: 'Postfix 587 TLS Certificate Expiration in {ITEM.VALUE} days on {{HOST.NAME}}'
              description: 'This trigger fires when the number of days remaining before the TLS certificate used by the Postfix server expires is less than 30 days. Monitoring TLS certificate expiration is crucial for ensuring that secure connections can be maintained and that there are no disruptions in mail server functionality due to expired certificates. It is important to renew the TLS certificate before it expires to maintain optimal security and performance of the mail server.'
              priority: WARNING
              recovery_mode: RECOVERY_EXPRESSION
              recovery_expression: last(/postfix_smtp_server/postfix.tls.cert.days)>=30
              manual_close: 'YES'
              dependencies:
                -
                  name: 'Postfix 587 TLS Certificate Expiration soon in ({ITEM.VALUE} days) on {{HOST.NAME}}'
                  expression: last(/postfix_smtp_server/postfix.tls.cert.days)<14
            -
              uuid: e21d4724c19e40cc840db54f221860ec
              expression: last(/postfix_smtp_server/postfix.tls.cert.days)<14
              name: 'Postfix 587 TLS Certificate Expiration soon in ({ITEM.VALUE} days) on {{HOST.NAME}}'
              description: 'This trigger fires when the number of days remaining before the TLS certificate used by the Postfix server expires is less than 7 days. Monitoring TLS certificate expiration is crucial for ensuring that secure connections can be maintained and that there are no disruptions in mail server functionality due to expired certificates. Immediate action is required to renew the TLS certificate to prevent security issues and maintain optimal performance of the mail server.'
              priority: WARNING
              recovery_mode: RECOVERY_EXPRESSION
              recovery_expression: last(/postfix_smtp_server/postfix.tls.cert.days)>=14
              manual_close: 'YES'
              dependencies:
                -
                  name: 'Postfix 587 TLS Certificate Expiration imminent in ({ITEM.VALUE} days) on {{HOST.NAME}}'
                  expression: last(/postfix_smtp_server/postfix.tls.cert.days)<7
            -
              uuid: 51423bbf4baf43f5b46f9d19640c2cb9
              expression: last(/postfix_smtp_server/postfix.tls.cert.days)<7
              name: 'Postfix 587 TLS Certificate Expiration imminent in ({ITEM.VALUE} days) on {{HOST.NAME}}'
              description: 'This trigger fires when the number of days remaining before the TLS certificate used by the Postfix server expires is less than 7 days. Monitoring TLS certificate expiration is crucial for ensuring that secure connections can be maintained and that there are no disruptions in mail server functionality due to expired certificates. Immediate action is required to renew the TLS certificate to prevent security issues and maintain optimal performance of the mail server.'
              priority: HIGH
              recovery_mode: RECOVERY_EXPRESSION
              recovery_expression: last(/postfix_smtp_server/postfix.tls.cert.days)>=7
              manual_close: 'NO'
              dependencies:
                -
                  name: 'Postfix 587 TLS Certificate Expiration imminent in ({ITEM.VALUE} days) on {{HOST.NAME}}'
                  expression: last(/postfix_smtp_server/postfix.tls.cert.days)<1
            -
              uuid: 8cd97343a0a54dbd9d10f15311149bf6
              expression: last(/postfix_smtp_server/postfix.tls.cert.days)<1
              name: 'Postfix 587 TLS Certificate Expiration imminent in ({ITEM.VALUE} days) on {{HOST.NAME}}'
